name: 每日触发

on:
  schedule:
    - cron: '0 11 * * *'  # 每天 UTC 11:00（北京时间 19:00）
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 执行签到
        run: python checkin.py
