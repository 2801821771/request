name: 每日触发

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 触发签到
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git commit --allow-empty -m "Trigger daily checkin [skip ci]"
          git push
