name: main

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 执行签到
        env:
          COOKIE_YYG: ${{ secrets.COOKIE_YYG }}
        run: python checkin.py
